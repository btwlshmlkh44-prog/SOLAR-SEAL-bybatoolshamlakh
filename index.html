<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منارة الابحاث | عالم الفقمة الذكي</title>
  <link rel="stylesheet" href="style-index.css">
</head>

<body>

  <header>
    <div class="logo">SOLAR SEAL 🦭</div>

    <nav>
      <a href="index.html" class="active">الرئيسية</a>
      <a href="sustainability.html">منارة الاستدامة</a>
      <a href="shop.html">متجر الفقمة</a>
      <a href="cart.html">سلة تسوق</a>
      <a href="contact.html">تواصل معنا</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>مرحباً بك في عالم الفقمة الذكية</h1>
      <p>
        أنا صديقتك الفقمة، سأرشدك نحو توفير الطاقة بذكاء واحترافية عالية
        لنجعل منزلك موفراً وصديقاً للبيئة بكل سهولة ومتعة 😉
      </p>
      <a href="sustainability.html" class="cta-button">ابدأ رحلتك الآن</a>
    </div>

    <div class="seal-art-box">
      <div class="floating-sun">☀️</div>

      <div class="seal-main-body">
        <div class="side-flipper left"></div>
        <div class="side-flipper right"></div>

        <div class="seal-cute-head">
          <div class="eye-sparkle left"></div>
          <div class="eye-sparkle right"></div>

          <div class="pink-cheeks left"></div>
          <div class="pink-cheeks right"></div>

          <div class="cute-nose">
            <div class="nose-dot"></div>
          </div>
        </div>
      </div>

      <div class="sea"></div>
    </div>
  </section>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      document.body.style.transform = "translateX(100%)";
      document.body.style.opacity = "0";
      document.body.style.transition = "transform 0.10s ease-out, opacity 0.35s ease-out";

      setTimeout(() => {
        document.body.style.transform = "translateX(0)";
        document.body.style.opacity = "1";
      }, 50);
    });
  </script>

</body>

</html>
